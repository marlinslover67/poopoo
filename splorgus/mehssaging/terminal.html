<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="icon" type="image/x-icon" href="https://andrewlovesmillie.com/assets/icons/canvas.ico"></head>

<style>
body{
    background:black;
    color:#8f9ce7;
    font-family:monospace;
    margin:0;
    overflow-x: hidden;
}

#terminal{
    height:100%;
    overflow-y:auto;
    padding:10px;
    white-space:pre-wrap;
}

#input{
    width:100%;
    border:none;
    outline:none;
    padding:10px;
    background:black;
    color:#8f9ce7;
    font-family:monospace;
}
</style>

</head>
<body>

<div id="terminal"></div>
<input id="input" placeholder="type command...">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDocs,
  query,
  where,
  collection,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyDUgTAyO5NgAPv6G9peylTBvIyem7sMF0w",
  authDomain: "zawgtwinmeh.firebaseapp.com",
  projectId: "zawgtwinmeh",
  storageBucket: "zawgtwinmeh.appspot.com",
  messagingSenderId: "655399885638",
  appId: "1:655399885638:web:cc8d2e24ba1418ee466347"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

function print(text){
    terminal.textContent += text + "\n";
    terminal.scrollTop = terminal.scrollHeight;
}

function emailFromUsername(username){
    return username + "@blapowpow.com";
}

async function ban(username, msg){

    if(!msg) msg = "You have been banned.";

    const q = query(collection(db,"users"), where("username","==",username));
    const snap = await getDocs(q);

    if(snap.empty){
        print("user not found");
        return;
    }

    const uid = snap.docs[0].id;

    await setDoc(doc(db,"users",uid),{
        banned:true,
        banMessage:msg,
        bannedAt:Date.now()
    },{merge:true});

    print(username + " banned: " + msg);
}

async function unban(username){

    const q = query(collection(db,"users"), where("username","==",username));
    const snap = await getDocs(q);

    if(snap.empty){
        print("user not found");
        return;
    }

    const uid = snap.docs[0].id;

    await setDoc(doc(db,"users",uid),{
        banned:false,
        banMessage:""
    },{merge:true});

    print(username + " unbanned");
}

async function signup(username,password){

    const email = emailFromUsername(username);

    const cred = await createUserWithEmailAndPassword(auth,email,password);

    await setDoc(doc(db,"users",cred.user.uid),{
        username:username,
        created:Date.now()
    });

    print("account created: "+cred.user.uid);
}

async function login(username,password){

    const email = emailFromUsername(username);

    const cred = await signInWithEmailAndPassword(auth,email,password);

    print("logged in: "+cred.user.uid);
}

async function msg(username,message){

    const q = query(collection(db,"users"), where("username","==",username));
    const snap = await getDocs(q);

    if(snap.empty){
        print("user not found");
        return;
    }

    const uid = snap.docs[0].id;

    await setDoc(
        doc(db,"users",uid,"notifications",Date.now().toString()),
        {
            message:message,
            timestamp:Date.now()
        }
    );

    print("message sent to "+username);
}

function onlineTrueFalse(online) {
    if (online) {return "online"}
    else {return "offline"}
}

async function sendCommand(username, command){

    const q = query(
        collection(db,"users"),
        where("username","==",username)
    );

    const snap = await getDocs(q);

    if(snap.empty){
        print("user not found");
        return;
    }

    const uid = snap.docs[0].id;

    await setDoc(
        doc(db,"users",uid,"commands",Date.now().toString()),
        {
            type: command,
            created: Date.now()
        }
    );

    print(command + " sent to " + username);

}


async function listUsers(){

    const snap = await getDocs(collection(db,"users"));

    if(snap.empty){
        print("no users found");
        return;
    }

    snap.forEach(docSnap=>{
        const data = docSnap.data();
        print(data.username + " (" + docSnap.id + ") " + "[" + onlineTrueFalse(data.online) + "]");
    });
}

async function broadcast(message){

    const snap = await getDocs(collection(db,"users"));

    for(const userDoc of snap.docs){

        await setDoc(
            doc(db,"users",userDoc.id,"notifications",Date.now().toString()),
            {
                message:message,
                timestamp:Date.now()
            }
        );
    }

    print("broadcast sent to " + snap.size + " users");
}

async function runCommand(text){

    const parts = text.split(" ");
    const cmd = parts[0];
    const args = parts.slice(1);

    try{

        if(cmd === "signup"){
            await signup(args[0],args[1]);
        }

        else if(cmd === "login"){
            await login(args[0],args[1]);
        }

        else if(cmd === "ban"){
            const username = args[0];
            const message = args.slice(1).join(" ");
            await ban(username,message);
        }

        else if(cmd === "unban"){
            await unban(args[0]);
        }

        else if(cmd === "msg"){
            const username = args[0];
            const message = args.slice(1).join(" ");
            await msg(username,message);
        }

        else if(cmd === "signout"){
            await sendCommand(parts[1],"signout");
        }

        else if(cmd === "closegame"){
            await sendCommand(parts[1],"closegame");
        }

        else if(cmd === "users"){
            await listUsers();
        }

        else if(cmd === "broadcast"){
            const message = args.join(" ");
            await broadcast(message);
        }

        else if(cmd === "help"){
            print(`
commands:
signup USER PASS
login USER PASS
ban USER MESSAGE
unban USER
msg USER MESSAGE
broadcast MESSAGE
users
help
`);
        }

        else{
            print("unknown command");
        }

    }catch(err){
        print("error: "+err.message);
    }
}

input.addEventListener("keydown", async e => {

    if(e.key === "Enter"){

        const text = input.value.trim();
        input.value = "";

        print("> "+text);

        await runCommand(text);
    }

});

print("Admin terminal");
print("type 'help'");

</script>
</body>
</html>
