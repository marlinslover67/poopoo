<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messenger</title>

<style>

body{
    background:black;
    color:#8f9ce7;
    font-family:monospace;
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
}

#messageboard{
    flex:1;
    overflow-y:auto;
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:4px;
}

#input{
    border:none;
    outline:none;
    padding:12px;
    background:#050505;
    border-top:1px solid #1c1c1c;
    color:#8f9ce7;
    font-family:monospace;
    word-wrap: break-word;
}

.system{
    color:#777;
    font-style:italic;
}

.username{
    color:#aab3ff;
}

.pm{
    color:#6be3ff;
}

</style>
</head>

<body>

<div id="messageboard"></div>
<input id="input" placeholder="loading chat..." disabled>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  deleteDoc,
  getDocs,
  limit,
  doc,
  getDoc,
  writeBatch
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyDUgTAyO5NgAPv6G9peylTBvIyem7sMF0w",
  authDomain: "zawgtwinmeh.firebaseapp.com",
  projectId: "zawgtwinmeh",
  storageBucket: "zawgtwinmeh.appspot.com",
  messagingSenderId: "655399885638",
  appId: "1:655399885638:web:cc8d2e24ba1418ee466347"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await setPersistence(auth, browserLocalPersistence);

const messageboard = document.getElementById("messageboard");
const input = document.getElementById("input");

const messagesRef = collection(db,"messages");

const admins = ["admin"];

let username = "anon";
let lastMessageTime = 0;

const SPAM_DELAY = 1500;
let connected = false;

const params = new URLSearchParams(location.search);
const uid = params.get("uid");



function createMessageElement(id, data) {
    const div = document.createElement("div");
    div.dataset.id = id;

    let displayTime = "[...] ";
    if (data.time) {
        const date = data.time.toDate();
        displayTime = "[" + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + "] ";
    }

    if (data.user === "SYSTEM") {
        div.className = "system";
        div.textContent = displayTime + data.text;
        return div;
    }

    const userSpan = document.createElement("span");
    userSpan.className = "username";
    userSpan.textContent = displayTime + data.user + ": ";

    div.appendChild(userSpan);
    div.append(data.text);
    return div;
}




function startChat(){

    const q = query(messagesRef,orderBy("time"),limit(100));

    onSnapshot(q,(snapshot)=>{

        if(!connected){
            messageboard.innerHTML="";
            connected=true;
        }

        snapshot.docChanges().forEach(change => {

            const id = change.doc.id;
            const data = change.doc.data();

            if(data.to && data.to !== username && data.user !== username){
                return;
            }

            if(change.type === "added"){

                const el = createMessageElement(id,data);
                messageboard.appendChild(el);
                messageboard.scrollTop = messageboard.scrollHeight;

            }

            if(change.type === "removed"){

                const el = messageboard.querySelector(`[data-id="${id}"]`);
                if(el) el.remove();

            }

        });

    });

}



async function trimMessages(){

    const snap = await getDocs(query(messagesRef,orderBy("time","asc")));

    if(snap.size <= 100) return;

    const remove = snap.docs.slice(0,snap.size-100);

    const batch = writeBatch(db);

    remove.forEach(d=>{
        batch.delete(d.ref);
    });

    await batch.commit();

}



onAuthStateChanged(auth, async (user) => {

    let userId = user?.uid || uid;

    if(!userId){
        messageboard.textContent="Not logged in. Open the launcher and log in.";
        input.disabled=true;
        return;
    }

    const snap = await getDoc(doc(db,"users",userId));

    const data = snap.data();

    if (snap.exists() && data.username) {
        username = data.username;
    } else {
        username = "anon";
    }
    input.disabled=false;
    input.placeholder="type message...";
    input.focus();

    startChat();

    if(!sessionStorage.getItem("joinedChat")){

        await addDoc(messagesRef,{
            user:"SYSTEM",
            text:username+" joined the chat",
            time:serverTimestamp()
        });

        sessionStorage.setItem("joinedChat","1");
    }

});



input.addEventListener("keydown",async(e)=>{

    if(e.key!=="Enter") return;

    e.preventDefault();

    const text=input.value.trim();
    if(!text) return;

    const now = new Date;
    let lastMessageTime = Date.now;

    if(now-lastMessageTime<SPAM_DELAY){
        return;
    }

    lastMessageTime=now;
    input.value="";



    if(text.startsWith("/pm ")){

        const parts = text.split(" ");
        const target = parts[1];
        const msg = parts.slice(2).join(" ");

        if(!target || !msg) return;

        await addDoc(messagesRef,{
            user:username,
            text:msg,
            to:target,
            time:serverTimestamp()
        });

        return;

    }



    if(text==="/clear" && admins.includes(username)){

        const snap = await getDocs(messagesRef);

        const batch = writeBatch(db);

        snap.docs.forEach(d=>{
            batch.delete(d.ref);
        });

        await batch.commit();

        await addDoc(messagesRef,{
            user:"SYSTEM",
            text:"chat cleared by "+username,
            time:serverTimestamp()
        });

        return;

    }

    const nowtime = new Date();
    const timeString = now.toLocaleTimeString('en-US', { 
        hour: 'numeric', 
        minute: 'numeric', 
        hour12: true
    });

    await addDoc(messagesRef,{
        user:username,
        text:text,
        to:null,
        time:serverTimestamp()
    });

    trimMessages();

});



const connecting=document.createElement("div");
connecting.className="system";
connecting.textContent="connecting to chat...";
messageboard.appendChild(connecting);

</script>

</body>
</html>
